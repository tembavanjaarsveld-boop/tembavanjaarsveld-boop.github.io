<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="880" viewBox="0 0 1440 880" role="img" aria-labelledby="title desc">
  <title id="title">Agentic OS full architecture</title>
  <desc id="desc">Layered architecture diagram for intake, orchestration, model services, integrations and governance.</desc>
  <rect width="1440" height="880" rx="36" fill="#081520"/>
  <text x="70" y="88" fill="#b8ff6a" font-family="Verdana, Geneva, sans-serif" font-size="34" font-weight="700">Agentic OS: Full Architecture</text>
  <text x="70" y="128" fill="#d4e1e4" font-family="Verdana, Geneva, sans-serif" font-size="22">Conversation-first intake, n8n orchestration, LLM routing, APIs and operational governance.</text>
  <g font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="700">
    <rect x="86" y="188" width="1268" height="104" rx="24" fill="#102838" stroke="#75d7ff" stroke-width="3"/>
    <text x="122" y="252" fill="#fff">React chat frontends, forms, webhooks, email and Teams entry points</text>
    <rect x="86" y="336" width="1268" height="124" rx="24" fill="#173229" stroke="#b8ff6a" stroke-width="3"/>
    <text x="122" y="392" fill="#fff">n8n orchestration: validation, branching, retry, enrichment and routing</text>
    <text x="122" y="428" fill="#dce8ec" font-size="18" font-weight="400">Chat Trigger -> AI Agent -> HTTP Request -> external systems</text>
    <rect x="86" y="504" width="392" height="156" rx="24" fill="#122332" stroke="#8fdfff" stroke-width="3"/>
    <text x="124" y="572" fill="#fff">LLM layer</text>
    <text x="124" y="612" fill="#dce8ec" font-size="18" font-weight="400">Claude API, prompts, evaluators</text>
    <rect x="524" y="504" width="392" height="156" rx="24" fill="#122332" stroke="#8fdfff" stroke-width="3"/>
    <text x="562" y="572" fill="#fff">Integration layer</text>
    <text x="562" y="612" fill="#dce8ec" font-size="18" font-weight="400">ClickUp, Recall.ai, REST APIs, JSON</text>
    <rect x="962" y="504" width="392" height="156" rx="24" fill="#122332" stroke="#8fdfff" stroke-width="3"/>
    <text x="1000" y="572" fill="#fff">Governance layer</text>
    <text x="1000" y="612" fill="#dce8ec" font-size="18" font-weight="400">Logs, approvals, risk controls</text>
    <rect x="86" y="704" width="1268" height="92" rx="24" fill="#1b2617" stroke="#b8ff6a" stroke-width="3"/>
    <text x="122" y="762" fill="#fff">Business outcomes: faster intake, auditable workflows, reusable automation patterns</text>
  </g>
</svg>
