<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="880" viewBox="0 0 1440 880" role="img" aria-labelledby="title desc">
  <title id="title">Agentic OS model router workflow</title>
  <desc id="desc">Diagram showing a router sending work to specialist AI models, tools, and governance checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09131f"/>
      <stop offset="1" stop-color="#182f2b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1440" height="880" rx="36" fill="url(#bg)"/>
  <text x="74" y="92" fill="#b8ff6a" font-family="Verdana, Geneva, sans-serif" font-size="34" font-weight="700">Agentic OS: Model Router</text>
  <text x="74" y="132" fill="#d4e1e4" font-family="Verdana, Geneva, sans-serif" font-size="22">Intent classification, model selection, tool calls and audit guardrails.</text>
  <g fill="none" stroke="#75d7ff" stroke-width="6" stroke-linecap="round" opacity="0.72">
    <path d="M372 430H565"/>
    <path d="M845 430h210"/>
    <path d="M705 326v-95h350"/>
    <path d="M705 534v95h350"/>
  </g>
  <g filter="url(#shadow)" font-family="Verdana, Geneva, sans-serif">
    <rect x="92" y="350" width="280" height="160" rx="28" fill="#102838" stroke="#75d7ff" stroke-width="3"/>
    <text x="132" y="414" fill="#fff" font-size="26" font-weight="700">User request</text>
    <text x="132" y="454" fill="#c8d8dc" font-size="20">Chat trigger</text>
    <text x="132" y="486" fill="#c8d8dc" font-size="20">Business context</text>
    <rect x="565" y="306" width="280" height="248" rx="30" fill="#183126" stroke="#b8ff6a" stroke-width="4"/>
    <text x="622" y="385" fill="#fff" font-size="30" font-weight="700">Router</text>
    <text x="615" y="432" fill="#dce8ec" font-size="21">Classify intent</text>
    <text x="615" y="466" fill="#dce8ec" font-size="21">Select model</text>
    <text x="615" y="500" fill="#dce8ec" font-size="21">Choose tools</text>
    <rect x="1055" y="142" width="292" height="150" rx="26" fill="#162635" stroke="#8fdfff" stroke-width="3"/>
    <text x="1094" y="204" fill="#fff" font-size="25" font-weight="700">Claude API</text>
    <text x="1094" y="244" fill="#c8d8dc" font-size="19">Reasoning + drafting</text>
    <rect x="1055" y="354" width="292" height="150" rx="26" fill="#162635" stroke="#8fdfff" stroke-width="3"/>
    <text x="1094" y="416" fill="#fff" font-size="25" font-weight="700">Workflow tools</text>
    <text x="1094" y="456" fill="#c8d8dc" font-size="19">ClickUp, APIs, docs</text>
    <rect x="1055" y="568" width="292" height="150" rx="26" fill="#162635" stroke="#8fdfff" stroke-width="3"/>
    <text x="1094" y="630" fill="#fff" font-size="25" font-weight="700">Governance</text>
    <text x="1094" y="670" fill="#c8d8dc" font-size="19">Logs, review, controls</text>
  </g>
</svg>
